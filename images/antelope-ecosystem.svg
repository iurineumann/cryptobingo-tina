<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0f172a" rx="12"/>
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Antelope Ecosystem</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13">Shared technological foundation — same core protocol, different optimizations</text>

  <!-- Center hub -->
  <circle cx="400" cy="280" r="95" fill="#1e293b" stroke="#6466f1" stroke-width="3"/>
  <text x="400" y="270" text-anchor="middle" fill="#a5b4fc" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Antelope</text>
  <text x="400" y="290" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Spring 1.0 Protocol</text>
  <text x="400" y="306" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">Savanna Consensus</text>

  <!-- WAX -->
  <circle cx="200" cy="120" r="48" fill="#1e293b" stroke="#22c55e" stroke-width="2.5"/>
  <text x="200" y="115" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="16" font-weight="700">WAX</text>
  <text x="200" y="132" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Gaming &amp; NFTs</text>
  <line x1="230" y1="155" x2="340" y2="215" stroke="#334155" stroke-width="1.5"/>

  <!-- Vaulta -->
  <circle cx="520" cy="120" r="48" fill="#1e293b" stroke="#f97316" stroke-width="2.5"/>
  <text x="520" y="115" text-anchor="middle" fill="#fb923c" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Vaulta</text>
  <text x="520" y="132" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Finance (ex-EOS)</text>
  <line x1="480" y1="155" x2="460" y2="215" stroke="#334155" stroke-width="1.5"/>

  <!-- Telos -->
  <circle cx="140" cy="390" r="48" fill="#1e293b" stroke="#6366f1" stroke-width="2.5"/>
  <text x="140" y="385" text-anchor="middle" fill="#818cf8" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Telos</text>
  <text x="140" y="402" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">EVM + Native</text>
  <line x1="175" y1="360" x2="340" y2="310" stroke="#334155" stroke-width="1.5"/>

  <!-- UX -->
  <circle cx="400" cy="460" r="48" fill="#1e293b" stroke="#ec4899" stroke-width="2.5"/>
  <text x="400" y="455" text-anchor="middle" fill="#f472b6" font-family="system-ui,sans-serif" font-size="16" font-weight="700">UX</text>
  <text x="400" y="472" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">DeFi Network</text>
  <line x1="420" y1="420" x2="420" y2="378" stroke="#334155" stroke-width="1.5"/>

  <!-- Proton -->
  <circle cx="650" cy="390" r="48" fill="#1e293b" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="650" y="385" text-anchor="middle" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Proton</text>
  <text x="650" y="402" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Payments + FIAT</text>
  <line x1="615" y1="360" x2="465" y2="310" stroke="#334155" stroke-width="1.5"/>

  <!-- Ultra -->
  <circle cx="650" cy="180" r="48" fill="#1e293b" stroke="#a855f7" stroke-width="2.5"/>
  <text x="650" y="175" text-anchor="middle" fill="#c084fc" font-family="system-ui,sans-serif" font-size="16" font-weight="700">Ultra</text>
  <text x="650" y="192" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Game Distribution</text>
  <line x1="610" y1="210" x2="475" y2="250" stroke="#334155" stroke-width="1.5"/>

  <!-- FIO -->
  <circle cx="200" cy="470" r="48" fill="#1e293b" stroke="#14b8a6" stroke-width="2.5"/>
  <text x="200" y="465" text-anchor="middle" fill="#2dd4bf" font-family="system-ui,sans-serif" font-size="16" font-weight="700">FIO</text>
  <text x="200" y="482" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Wallet Usability</text>
  <line x1="235" y1="435" x2="340" y2="345" stroke="#334155" stroke-width="1.5"/>

  <text x="400" y="550" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="11">All Antelope chains share Spring 1.0, Savanna consensus (~1s finality), BLS signatures, and C++ smart contracts via cdt-cpp</text>
</svg>